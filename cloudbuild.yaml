# Cloud Build pipeline for Tankonomics
# Triggered on push to GitHub. Builds a container, pushes to Artifact Registry,
# and deploys to Cloud Run with secrets pulled from Secret Manager.
#
# Substitution variables (set on the Cloud Build trigger or override here):
#   _REGION              GCP region for Cloud Run + Artifact Registry (e.g. us-central1, asia-south1)
#   _REPO                Artifact Registry repo name (create once: gcloud artifacts repositories create ...)
#   _SERVICE             Cloud Run service name (e.g. tankonomics)
#   _APP_URL             Public URL of the Cloud Run service (set after first deploy, then redeploy)

substitutions:
  _REGION: asia-south1
  _REPO: tankonomics
  _SERVICE: tankonomics
  _APP_URL: ""

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # 1. Build the container image, tagged with both the commit SHA and "latest"
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  # 2. Push both tags to Artifact Registry
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

  # 3. Deploy to Cloud Run.
  #    - --allow-unauthenticated makes it publicly reachable (drop this for private services).
  #    - --set-secrets binds Secret Manager secrets to env vars at runtime.
  #      You must create these secrets first:
  #         gcloud secrets create gemini-key --replication-policy=automatic
  #         echo -n "your-key" | gcloud secrets versions add gemini-key --data-file=-
  #      ...and grant the Cloud Run runtime service account the
  #      "Secret Manager Secret Accessor" role on each secret.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --timeout=60s
      - --set-env-vars=NODE_ENV=production,APP_URL=${_APP_URL}
      - --set-secrets=GEMINI_API_KEY=gemini-key:latest,RESEND_API_KEY=resend-key:latest,LINKEDIN_CLIENT_ID=linkedin-client-id:latest,LINKEDIN_CLIENT_SECRET=linkedin-client-secret:latest

# Record the built images so they appear in the Cloud Build UI
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

timeout: 1200s
